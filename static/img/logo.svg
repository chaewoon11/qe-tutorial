<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="QE tutorial logo">
  <defs>
    <linearGradient id="qeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3182ce"/>
      <stop offset="1" stop-color="#1a365d"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#qeBg)"/>
  <!-- plane wave -->
  <path d="M5 32 C 11 17, 19 17, 25 32 S 39 47, 45 32 S 59 17, 63 32"
        fill="none" stroke="#bee3f8" stroke-width="2.4" stroke-linecap="round" opacity="0.5"/>
  <!-- bond -->
  <line x1="24" y1="39" x2="40" y2="25" stroke="#e2e8f0" stroke-width="3.4" stroke-linecap="round"/>
  <!-- two atoms (Ga / As) -->
  <circle cx="24" cy="39" r="8.5" fill="#4fd1c5"/>
  <circle cx="40" cy="25" r="7" fill="#f6ad55"/>
</svg>
